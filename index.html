<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chuyển đổi Word và PDF</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.4.0/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Chuyển đổi Word và PDF</h1>
        <input type="file" id="fileInput" accept=".doc,.docx,.pdf" />
        <button id="convertBtn">Chuyển đổi</button>
        <button id="downloadBtn" style="display: none;">Tải xuống PDF</button>
        <div id="output"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
